<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Form validation with messages on top: Code example - Accessibility Developer Guide example</title>
        <meta charset="utf-8">
        <style>.control, fieldset {
      margin: 6px 0;
    }
    
    label {
      display: inline-block;
      width: 120px;
      vertical-align: top;
    }
    
    input + label {
      width: auto;
    }
    
    .error, .required {
      color: red;
    }
    fieldset.errors {
      border-color: #c00;
      margin-bottom: 1em;
    }
    fieldset.errors a { color: #c00; }
    #success-message {
      padding: 0.5em 0;
      color: #006b3a;
      font-weight: bold;
    }
    fieldset ul {
      margin: 0;
    }</style>
    </head>
    <body>
        <h1>Feedback form</h1>
    <!-- ACCESSIBILITY: Errors summary at top (WET 4 pattern); role="alert" and focus management added in script -->
    <form id="feedback-form" method="get" action="">
        <div class="control">
          <label for="name">Full name <span class="required" aria-hidden="true">*</span></label><input id="name" name="name" type="text" aria-required="true" />
        </div>
        <div class="control">
          <label for="biography">Biography</label><textarea id="biography" name="biography"></textarea>
          <span id="biography-hint">Include examples on your skills in JavaScript.</span>
        </div>
        <!-- ACCESSIBILITY: Fieldset and legend for grouping; labels use for/id to associate with inputs -->
        <fieldset aria-required="true">
          <legend>Gender</legend>
          <div class="control">
            <input id="gender_male" name="gender" type="radio" value="male" /><label for="gender_male">Male</label>
          </div>
          <div class="control">
            <input id="gender_female" name="gender" type="radio" value="female" /><label for="gender_female">Female</label>
          </div>
        </fieldset>
        <div class="control">
          <input id="accept_agbs" name="accept_agbs" type="checkbox" value="1" aria-required="true" /><label for="accept_agbs">I accept the terms and conditions</label>
        </div>
        <div class="control">
          <input name="validate" type="hidden" value="1" /><input type="submit" value="Register" />
        </div>
      </form>
      
          <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js" integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>
          <script>"use strict";
      
      ;
      (function () {
        var validateInput;
      
        $.urlParam = function (name) {
          var results;
          results = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.href);
      
          if (results === null) {
            return null;
          } else {
            return decodeURI(results[1]) || null;
          }
        };
      
        validateInput = function validateInput(input, message) {
          var $elementToDescribe, $error, $errorContainer, $fieldset, $input, $referencedElement, value;
          $input = $('[name="' + input + '"]');
      
          if ((value = $.urlParam(input)) === null) {
            if ($('fieldset.errors').length === 0) {
              // WET 4 pattern: errors summary at top; role="alert" so screen readers announce; tabindex="-1" for focus management
              $('form').prepend('<fieldset class="errors" role="alert" aria-labelledby="errors-legend" tabindex="-1"><legend id="errors-legend">Errors</legend><ul></ul></fieldset>');
            }
      
            $referencedElement = null;
            $elementToDescribe = null;
            $errorContainer = $('fieldset.errors ul');
      
            if ($input.is(':radio')) {
              $fieldset = $input.closest('fieldset');
              $elementToDescribe = $fieldset;
              $referencedElement = $input.filter(':first');
            } else {
              $elementToDescribe = $input;
              $referencedElement = $input;
            }
            // R.G. hint: fix next line ;) - Use <a> with id (for aria-describedby) and href to field so each error is linked to the field and keyboard/screen reader can navigate
            var fieldId = $referencedElement.attr('id') || input + '_field';
            $error = $('<a id="' + input + '_description" href="#' + fieldId + '">' + message + '</a>');
            $error.on('click', function (e) {
              e.preventDefault();
              $referencedElement.focus();
            });
            $elementToDescribe.attr('aria-describedby', input + '_description');
            $errorContainer.append($('<li>').append($error));
      
            // Focus management: move focus to the errors area when no element has focus (e.g. after page load) so screen reader and keyboard users are notified
            if ($(':focus').length === 0) {
              $('fieldset.errors').get(0).focus();
            }
          } else {
            if ($input.is(':checkbox')) {
              $input.attr('checked', true);
            }
      
            if ($input.is(':radio')) {
              return $input.filter('[value="' + value + '"]').attr('checked', true);
            } else {
              return $input.val(value);
            }
          }
        };
      
        $(document).ready(function () {
          if ($.urlParam('validate')) {
            validateInput('name', 'Please enter your name!');
            validateInput('biography', 'Please tell us something about your history!');
            validateInput('gender', 'Please tell us your gender!');
            validateInput('accept_agbs', 'You must accept our terms and conditions!');
      
            // Show success only when form is fully valid (no errors fieldset was created). Accessible: role="alert" + focus so screen readers hear it.
            if ($('fieldset.errors').length === 0) {
              var $success = $('<div id="success-message" role="alert" aria-live="polite" tabindex="-1">All inputs are valid.</div>');
              $('form').prepend($success);
              $success.get(0).focus();
            }
          }
        });
      }).call(void 0);</script>
                
        </body>
      </html>
